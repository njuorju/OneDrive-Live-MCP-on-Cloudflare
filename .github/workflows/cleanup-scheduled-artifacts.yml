name: Clean scheduled execution validation artifacts

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/cleanup-scheduled-artifacts.yml

permissions:
  contents: write

jobs:
  clean:
    if: github.event.pull_request.head.ref == 'work/scheduled-execution-schema' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/scheduled-execution-schema
          fetch-depth: 0
      - name: Restore tracked generated sources and remove dry-run output
        shell: bash
        run: |
          git checkout origin/main -- src/generated/pdfjs-main.ts src/generated/pdfjs-worker.ts
          rm -rf dist-scheduled-contract
          rm -f .github/workflows/cleanup-scheduled-artifacts.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove scheduled execution validation artifacts"
          git push origin HEAD:work/scheduled-execution-schema
