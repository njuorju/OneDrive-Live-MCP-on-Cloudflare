name: Apply integrity lease wiring

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - scripts/apply-integrity-lease-wiring.mjs
      - .github/workflows/apply-integrity-lease-wiring.yml
      - src/integrity-coordination.ts
      - src/integrity-lease-tools.ts
      - test/integrity-coordination.test.ts

permissions:
  contents: write

concurrency:
  group: integrity-lease-wiring-pr-11
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'work/integrity-resume-reconciliation'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/integrity-resume-reconciliation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Apply deterministic wiring
        run: node scripts/apply-integrity-lease-wiring.mjs
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate wiring
        run: |
          npm run type-check
          npm test
      - name: Commit generated wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/auth-state.ts src/index-hotfix.ts src/integrity-resume-repair.ts worker-configuration.d.ts wrangler.jsonc .github/workflows/upload-integrity-resume-candidate.yml
          git commit -m "Wire transactional integrity execution leases" || exit 0
          git fetch origin work/integrity-resume-reconciliation
          git rebase origin/work/integrity-resume-reconciliation
          git push origin HEAD:work/integrity-resume-reconciliation
