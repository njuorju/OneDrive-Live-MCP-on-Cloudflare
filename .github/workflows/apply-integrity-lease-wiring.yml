name: Apply integrity lease wiring

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - scripts/apply-integrity-lease-wiring.mjs
      - scripts/fix-integrity-hardening-tests.mjs
      - .github/workflows/apply-integrity-lease-wiring.yml
      - src/integrity-coordination.ts
      - src/integrity-lease-tools.ts
      - src/integrity-resume-repair.ts
      - test/integrity-coordination.test.ts

permissions:
  contents: write

concurrency:
  group: integrity-lease-wiring-pr-11
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'work/integrity-resume-reconciliation'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/integrity-resume-reconciliation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Apply deterministic hardening
        run: |
          node scripts/apply-integrity-lease-wiring.mjs
          node scripts/fix-integrity-hardening-tests.mjs
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate hardening
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee lease-hardening-typecheck.log
          npm test 2>&1 | tee lease-hardening-tests.log
      - name: Upload hardening diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-lease-hardening-diagnostics
          path: |
            lease-hardening-typecheck.log
            lease-hardening-tests.log
          if-no-files-found: ignore
          retention-days: 1
      - name: Commit generated hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/integrity-coordination.ts src/integrity-lease-tools.ts src/integrity-resume-repair.ts test/integrity-coordination.test.ts
          git commit -m "Harden fenced integrity execution and recovery" || exit 0
          git fetch origin work/integrity-resume-reconciliation
          git rebase origin/work/integrity-resume-reconciliation
          git push origin HEAD:work/integrity-resume-reconciliation
