name: Trigger OneDrive image fix deployment

on:
  pull_request_target:
    types:
      - opened

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event.pull_request.head.ref == 'trigger/deploy-image-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch pinned one-shot deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-image-fix-once.yml --ref main
