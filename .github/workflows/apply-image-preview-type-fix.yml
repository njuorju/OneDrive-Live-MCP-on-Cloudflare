name: Apply image preview type fix

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  patch-validate-and-commit:
    if: >-
      github.event.pull_request.head.ref == 'work/onedrive-write-images' &&
      github.event.pull_request.base.ref == 'validation/b6a35bba-exact-tree'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/onedrive-write-images
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Apply minimal ArrayBuffer typing fix
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/onedrive-files.ts")
          text = path.read_text(encoding="utf-8")
          old = '''  const preview = await withTimeout(
              response.arrayBuffer(),
              config.imageProcessingTimeoutMs,
            );'''
          new = '''  const preview = await withTimeout<ArrayBuffer>(
              response.arrayBuffer(),
              config.imageProcessingTimeoutMs,
            );'''
          if text.count(old) != 1:
              raise SystemExit(f"Expected exactly one untyped preview block, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm test
      - name: Audit
        run: npm audit --audit-level=high
      - name: Wrangler dry-run
        shell: bash
        run: |
          cp wrangler.jsonc wrangler.typefix.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/TYPEFIX_TEST_ROOT/g' wrangler.typefix.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.typefix.jsonc
          npx wrangler deploy --dry-run --config wrangler.typefix.jsonc --outdir dist-typefix
      - name: Commit validated fix and remove one-use workflow
        shell: bash
        run: |
          rm .github/workflows/apply-image-preview-type-fix.yml
          rm -f wrangler.typefix.jsonc
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/onedrive-files.ts .github/workflows/apply-image-preview-type-fix.yml
          git commit -m "fix: type Cloudflare image preview buffer"
          git push origin HEAD:work/onedrive-write-images
