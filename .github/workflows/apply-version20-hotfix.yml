name: Apply version 20 hotfix

on:
  push:
    branches:
      - work/integrated-source-integrity-visuals
    paths:
      - .github/workflows/apply-version20-hotfix.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - run: npm ci

      - name: Apply deployed version 20 source fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          # Shared integrated state through the existing global AuthState Durable Object.
          replace_once(
              "src/auth-state-client.ts",
              'import type { AuthStateKind, AuthStateOpResult } from "./auth-store";\n',
              'import type { AuthStateKind, AuthStateOpResult } from "./auth-store";\n'
              'import { ConnectorError } from "./errors";\n'
              'import type { StorageLike } from "./integrated-tools";\n',
          )
          replace_once(
              "src/auth-state-client.ts",
              "async function callAuthState(\n",
              "export async function callAuthState(\n",
          )
          client = Path("src/auth-state-client.ts")
          client_text = client.read_text(encoding="utf-8")
          client_text += '''

export type IntegratedStateResult = AuthStateOpResult & {
  value?: unknown;
  entries?: Array<[string, unknown]>;
  deleted?: boolean;
};

function assertIntegratedStateResult(
  result: IntegratedStateResult,
  operation: string,
): IntegratedStateResult {
  if (!result?.ok) {
    throw new ConnectorError(
      "state_storage_unavailable",
      `Integrated state ${operation} failed.`,
      { retryable: true },
    );
  }
  return result;
}

export function createIntegratedStateStorage(env: Env, userId: string): StorageLike {
  return {
    async get<T = unknown>(key: string): Promise<T | undefined> {
      const result = assertIntegratedStateResult(
        await callAuthState(env, "/state-get", { userId, key }) as IntegratedStateResult,
        "read",
      );
      return result.found ? result.value as T : undefined;
    },
    async put<T = unknown>(key: string, value: T): Promise<void> {
      assertIntegratedStateResult(
        await callAuthState(env, "/state-put", { userId, key, value }) as IntegratedStateResult,
        "write",
      );
    },
    async delete(key: string): Promise<boolean> {
      const result = assertIntegratedStateResult(
        await callAuthState(env, "/state-delete", { userId, key }) as IntegratedStateResult,
        "delete",
      );
      return Boolean(result.deleted);
    },
    async list<T = unknown>(options: { prefix?: string } = {}): Promise<Map<string, T>> {
      const result = assertIntegratedStateResult(
        await callAuthState(env, "/state-list", {
          userId,
          prefix: String(options.prefix ?? "integrated:"),
        }) as IntegratedStateResult,
        "list",
      );
      return new Map((result.entries ?? []) as Array<[string, T]>);
    },
  };
}
'''
