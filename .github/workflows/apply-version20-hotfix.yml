              '''export function pdfPageDimensions(buffer: ArrayBuffer, page: number): { width: number; height: number } {
  const binary = new TextDecoder("latin1").decode(new Uint8Array(buffer));
  const boxes = [...binary.matchAll(/\\/(?:CropBox|MediaBox)\\s*\\[\\s*(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s*\\]/g)]
    .map((match) => {
      const x1 = Number(match[1]);
      const y1 = Number(match[2]);
      const x2 = Number(match[3]);
      const y2 = Number(match[4]);
      return { width: Math.abs(x2 - x1), height: Math.abs(y2 - y1) };
    })
    .filter((box) => Number.isFinite(box.width) && Number.isFinite(box.height) && box.width > 0 && box.height > 0);
  const selected = boxes[Math.min(Math.max(page - 1, 0), boxes.length - 1)] ?? boxes[0];
  return selected ?? { width: 595, height: 842 };
}

async function browserScreenshot(context: IntegratedContext, html: string, width: number, height: number, crop?: { x: number; y: number; width: number; height: number }): Promise<ArrayBuffer> {
