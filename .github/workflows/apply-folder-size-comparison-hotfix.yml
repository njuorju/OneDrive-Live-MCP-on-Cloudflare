name: Apply folder-size comparison hotfix

on:
  push:
    branches:
      - work/folder-size-comparison-hotfix
    paths:
      - .github/workflows/apply-folder-size-comparison-hotfix.yml
      - folder-size-hotfix-trigger.txt

permissions:
  contents: write

concurrency:
  group: folder-size-comparison-hotfix
  cancel-in-progress: true

jobs:
  patch-validate-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Apply minimal file-only size comparison repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path('src/integrated-tools.ts')
          text = source.read_text(encoding='utf-8')

          marker = '''async function compareSnapshotToLive(context: IntegratedContext, snapshotId: string): Promise<Record<string, unknown>> {'''
          helper = '''export function snapshotRecordSizeChanged(
            before: Pick<SnapshotRecord, "type" | "byteSize">,
            after: Pick<SnapshotRecord, "type" | "byteSize">,
          ): boolean {
            return before.type === "file" && after.type === "file" && before.byteSize !== after.byteSize;
          }

          async function compareSnapshotToLive(context: IntegratedContext, snapshotId: string): Promise<Record<string, unknown>> {'''
          if text.count(marker) != 1:
              raise SystemExit(f'expected one compare marker, found {text.count(marker)}')
          text = text.replace(marker, helper, 1)

          old = '''    if (before.byteSize !== after.byteSize) changedSizes.push({ itemId: before.itemId, path: after.relativePath, before: before.byteSize, after: after.byteSize });'''
          new = '''    if (snapshotRecordSizeChanged(before, after)) changedSizes.push({ itemId: before.itemId, path: after.relativePath, before: before.byteSize, after: after.byteSize });'''
          if text.count(old) != 1:
              raise SystemExit(f'expected one size comparison, found {text.count(old)}')
          text = text.replace(old, new, 1)
          source.write_text(text, encoding='utf-8')

          Path('test/snapshot-live-compare.test.ts').write_text('''import test from "node:test";
          import assert from "node:assert/strict";
          import { snapshotRecordSizeChanged } from "../src/integrated-tools.js";

          test("ignores aggregate live sizes for folders", () => {
            assert.equal(
              snapshotRecordSizeChanged(
                { type: "folder", byteSize: null },
                { type: "folder", byteSize: 853_889_608 },
              ),
              false,
            );
          });

          test("detects actual file byte-size changes", () => {
            assert.equal(
              snapshotRecordSizeChanged(
                { type: "file", byteSize: 100 },
                { type: "file", byteSize: 101 },
              ),
              true,
            );
          });

          test("does not report unchanged files or cross-type records as size changes", () => {
            assert.equal(snapshotRecordSizeChanged({ type: "file", byteSize: 100 }, { type: "file", byteSize: 100 }), false);
            assert.equal(snapshotRecordSizeChanged({ type: "folder", byteSize: null }, { type: "file", byteSize: 100 }), false);
          });
          ''', encoding='utf-8')
          PY

      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Full test suite
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-hotfix.log
          total=$(grep -E '^# tests [0-9]+' test-hotfix.log | tail -n1 | awk '{print $3}')
          passed=$(grep -E '^# pass [0-9]+' test-hotfix.log | tail -n1 | awk '{print $3}')
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"
          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"

      - name: High-severity dependency audit
        run: npm audit --audit-level=high

      - name: Wrangler dry run
        shell: bash
        run: |
          cp wrangler.jsonc wrangler.hotfix-ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.hotfix-ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.hotfix-ci.jsonc
          npx wrangler versions upload --dry-run --config wrangler.hotfix-ci.jsonc --outdir dist-hotfix

      - name: Remove temporary workflow and trigger
        shell: bash
        run: |
          rm -f .github/workflows/apply-folder-size-comparison-hotfix.yml folder-size-hotfix-trigger.txt
          rm -f wrangler.hotfix-ci.jsonc test-hotfix.log
          rm -rf dist-hotfix

      - name: Commit validated source-only repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix folder size false positives in snapshot comparison" -m "Validated typecheck, audit, Wrangler dry run, and ${{ steps.tests.outputs.passed }}/${{ steps.tests.outputs.total }} tests."
          git push origin HEAD:work/folder-size-comparison-hotfix
