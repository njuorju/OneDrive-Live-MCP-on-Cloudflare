name: Delete merged feature branch

on:
  push:
    branches:
      - work/integrity-plan-free-budget

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged remote branch
        run: git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" --delete work/integrity-plan-free-budget
