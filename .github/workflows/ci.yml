name: CI

on:
  push:
    branches:
      - main
      - work/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
      - name: Install from the public npm registry and regenerate lockfile
        run: npm install --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Upload regenerated public lockfile
        uses: actions/upload-artifact@v4
        with:
          name: public-package-lock
          path: package-lock.json
          retention-days: 1
      - run: npm run type-check
      - run: npm test
      - run: npm audit --audit-level=high
      - name: Dry-run Worker bundle with non-secret test placeholders
        run: |
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist
