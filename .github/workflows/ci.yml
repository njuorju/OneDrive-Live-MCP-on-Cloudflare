name: CI

on:
  push:
    branches:
      - main
      - work/**
    paths-ignore:
      - deploy-artifacts/**
  pull_request:
    paths-ignore:
      - deploy-artifacts/**

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.event_name }}
          path: |
            typecheck.log
            test.log
          if-no-files-found: ignore
          retention-days: 1
      - run: npm audit --audit-level=high
      - name: Dry-run Worker bundle with non-secret test placeholders
        run: |
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist
      - name: Upload non-secret Worker bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 1
      - name: Publish deployable bundle to branch
        if: github.event_name == 'push'
        shell: bash
        run: |
          mkdir -p deploy-artifacts
          cp dist/index.js deploy-artifacts/index.js
          printf '{"source_sha":"%s","generated_at":"%s"}\n' "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deploy-artifacts/build.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-artifacts/index.js deploy-artifacts/build.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "build: publish deployable worker bundle [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
