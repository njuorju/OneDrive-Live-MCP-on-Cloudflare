name: CI

on:
  push:
    branches:
      - main
      - work/**
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply downstream-rename reconciliation patch and restore CI
        if: github.event_name == 'pull_request' && github.head_ref == 'work/integrity-resume-reconciliation'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/integrity-resume-repair.ts')
          text = p.read_text()
          old = '''function expectedRenameParent(plan: IntegrityPlan, action: PlanAction): string {
  const prior = latestPriorResult(plan, action);
  const priorAfter = prior?.after as CompactItem | undefined;
  return priorAfter?.relativePath ? parentPath(priorAfter.relativePath) : parentPath(String(action.sourcePath ?? ""));
}
'''
          new = '''function expectedRenameParents(plan: IntegrityPlan, action: PlanAction): string[] {
  const prior = latestPriorResult(plan, action);
  const priorAfter = prior?.after as CompactItem | undefined;
  const candidates = new Set<string>();
  candidates.add(priorAfter?.relativePath ? parentPath(priorAfter.relativePath) : parentPath(String(action.sourcePath ?? "")));
  for (const later of plan.actions) {
    if (later.sourceItemId !== action.sourceItemId || later.action !== "MOVE") continue;
    if (Number(later.operationOrder ?? 0) <= Number(action.operationOrder ?? 0)) continue;
    if (!(later.dependencies ?? []).includes(action.actionId)) continue;
    if (later.destinationPath) candidates.add(strictRelativePath(later.destinationPath));
  }
  return [...candidates];
}
'''
          old2 = '''    const parentMatches = parentPath(live.relativePath).toLocaleLowerCase("en") === expectedRenameParent(plan, action).toLocaleLowerCase("en");
    const nameMatches = live.item.name === String(action.proposedFilename ?? "");
'''
          new2 = '''    const liveParent = parentPath(live.relativePath).toLocaleLowerCase("en");
    const parentMatches = expectedRenameParents(plan, action).some((candidate) => candidate.toLocaleLowerCase("en") === liveParent);
    const nameMatches = live.item.name === String(action.proposedFilename ?? "");
'''
          if old in text:
              if old2 not in text:
                  raise SystemExit('rename parent match anchor missing')
              p.write_text(text.replace(old, new).replace(old2, new2))
              t = Path('test/integrity-resume-repair.test.ts')
              tests = t.read_text()
              marker = 'test("stable item ID runtime resolution preserves the original plan evidence", () => {'
              addition = '''test("externally renamed item may reconcile after its dependent move already completed", () => {\n  assert.match(source, /function expectedRenameParents/);\n  assert.match(source, /later\.action !== "MOVE"/);\n  assert.match(source, /later\.dependencies.*includes\(action\.actionId\)/);\n  assert.match(source, /later\.destinationPath/);\n});\n\n'''
              if addition not in tests:
                  if marker not in tests:
                      raise SystemExit('test insertion anchor missing')
                  t.write_text(tests.replace(marker, addition + marker))
          Path('.github/workflows/apply-downstream-rename-reconciliation.yml').unlink(missing_ok=True)
          PY
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add src/integrity-resume-repair.ts test/integrity-resume-repair.test.ts .github/workflows/ci.yml .github/workflows/apply-downstream-rename-reconciliation.yml
            git commit -m "Reconcile renamed items after downstream moves"
            git push origin HEAD:work/integrity-resume-reconciliation
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.event_name }}
          path: |
            typecheck.log
            test.log
          if-no-files-found: ignore
          retention-days: 1
      - run: npm audit --audit-level=high
      - name: Dry-run Worker bundle with non-secret test placeholders
        run: |
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist
      - name: Upload non-secret Worker bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 1
