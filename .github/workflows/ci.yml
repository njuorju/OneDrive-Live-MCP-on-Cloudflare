  const itemId = String(input.itemId ?? "");
  const page = Math.max(Number(input.pageOrSlide ?? input.page ?? 1), 1);
  const outputFormat = String(input.outputFormat ?? "png").toLocaleLowerCase("en") as "png" | "jpeg" | "webp";
  if (!["png", "jpeg", "webp"].includes(outputFormat)) throw new ConnectorError("invalid_output_format", "Output format must be PNG, JPEG, or WebP.");
  const requestedDpi = input.dpi === undefined ? null : Math.min(Math.max(Number(input.dpi), 36), 300);
  const widthFromDpi = requestedDpi ? Math.round(requestedDpi * 8.27) : 1_600;
  const width = Math.min(Math.max(Number(input.width ?? widthFromDpi), 256), INTEGRATED_LIMITS.renderDimensionMax);
  const { verified, pdf } = await pdfBytesForRender(context, itemId);
  const pdfInfo = inspectPdfBytes(pdf);
  if (page > pdfInfo.pageCount) throw new ConnectorError("page_out_of_range", "The requested page or slide number is outside the document.");
  const pageDimensions = pdfPageDimensions(pdf, page);
  const height = Math.min(Math.max(Math.round(width * pageDimensions.height / pageDimensions.width), 256), INTEGRATED_LIMITS.renderDimensionMax);
  const pageCssWidth = Math.max(1, Math.round(pageDimensions.width * 96 / 72));
  const pageCssHeight = Math.max(1, Math.round(pageDimensions.height * 96 / 72));
  const viewerMarginX = 32;
  const viewerPageTop = 3;
  const viewerBottom = 12;
  const viewerWidth = Math.min(Math.max(width, pageCssWidth + viewerMarginX * 2, 256), INTEGRATED_LIMITS.renderDimensionMax);
  const viewerHeight = Math.min(Math.max(height, pageCssHeight + viewerPageTop + viewerBottom, 256), INTEGRATED_LIMITS.renderDimensionMax);
  const renderToken = await sealJson(context.env.COOKIE_ENCRYPTION_KEY, {
    kind: "document-render",
    userId: context.userId,
    itemId,
    expiresAt: Date.now() + 60_000,
  });
  const renderUrl = `https://nikolay-onedrive-mcp.fdas201290.workers.dev/__document-render/${encodeURIComponent(renderToken)}#page=${page}&zoom=page-fit&toolbar=0&navpanes=0&scrollbar=0`;
  const cropRaw = input.cropRegion as Record<string, unknown> | undefined;
  const crop = cropRaw ? {
    x: Math.min(Math.max(Number(cropRaw.x ?? 0), 0), width - 1),
    y: Math.min(Math.max(Number(cropRaw.y ?? 0), 0), height - 1),
    width: Math.min(Math.max(Number(cropRaw.width ?? width), 1), width),
    height: Math.min(Math.max(Number(cropRaw.height ?? height), 1), height),
  } : undefined;
  if (crop) {
    crop.width = Math.min(crop.width, width - crop.x);
    crop.height = Math.min(crop.height, height - crop.y);
  }
  const scaleX = pageCssWidth / width;
  const scaleY = pageCssHeight / height;
  const pageLeft = Math.max(0, Math.round((viewerWidth - pageCssWidth) / 2));
  const clip = crop ? {
    x: pageLeft + crop.x * scaleX,
    y: viewerPageTop + crop.y * scaleY,
    width: crop.width * scaleX,
    height: crop.height * scaleY,
  } : { x: pageLeft, y: viewerPageTop, width: pageCssWidth, height: pageCssHeight };
  const png = await browserScreenshot(context, renderUrl, viewerWidth, viewerHeight, clip);
  const converted = await convertImageOutput(context, png, outputFormat);
  return {
    metadata: {
      ...compactVerifiedItem(verified),
      requestedPageOrSlide: page,
      totalPagesOrSlides: pdfInfo.pageCount,
      outputFormat,
      mimeType: converted.mimeType,
      width: Math.max(1, Math.round(clip.width)),
      height: Math.max(1, Math.round(clip.height)),
      requestedDpi,
      cropRegion: crop ?? null,
      exactRequestedPage: true,
      officeConversion: extensionOf(verified.item.name) === ".pdf" ? "not_required" : "microsoft_graph_pdf",
      renderer: "cloudflare_browser_run_page_clip",
    },
    image: { type: "image", data: bytesToBase64(converted.bytes), mimeType: converted.mimeType },
    bytes: converted.bytes,
  };
}

