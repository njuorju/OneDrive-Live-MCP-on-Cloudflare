name: Delete merged feature branches

on:
  push:
    branches:
      - work/integrity-plan-free-budget

permissions:
  contents: write

jobs:
  delete-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged remote branches
        run: |
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" --delete work/integrity-plan-free-budget
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" --delete cleanup/trigger-integrity-branch-delete || true
