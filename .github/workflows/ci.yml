name: Apply proven live hotfix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-proven-hotfix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Apply stable-state and exact-page source fixes
        shell: bash
        run: |
          python3 - <<'PY'
