  const binary = new TextDecoder("latin1").decode(new Uint8Array(buffer));
  const boxes = [...binary.matchAll(/\\/(?:CropBox|MediaBox)\\s*\\[\\s*(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s+(-?\\d+(?:\\.\\d+)?)\\s*\\]/g)]
