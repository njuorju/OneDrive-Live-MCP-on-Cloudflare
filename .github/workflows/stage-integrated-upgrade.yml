name: Stage integrated OneDrive upgrade once

on:
  push:
    branches:
      - work/integrated-source-integrity-visuals
    paths:
      - .github/workflows/stage-integrated-upgrade.yml

permissions:
  contents: read

concurrency:
  group: stage-integrated-onedrive-upgrade-once
  cancel-in-progress: false

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: nikolay-onedrive-mcp
      CURRENT_VERSION_ID: ea3ee285-1958-46c5-9ac6-b2c8a3202ece
      WORKER_URL: https://nikolay-onedrive-mcp.fdas201290.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Validate exact staged source
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          npm ci --ignore-scripts --no-audit --no-fund
          npm run type-check
          npm test
          npm audit --audit-level=high
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist-check

      - name: Upload zero-traffic version and smoke by override
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Cloudflare API token is not configured."
            exit 20
          fi

          mkdir -p .deploy
          printf '{"name":"%s"}\n' "$WORKER_NAME" > .deploy/lookup.json
          npx wrangler deployments status --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/before.json

          CURRENT_VERSION_ID="$CURRENT_VERSION_ID" node <<'NODE'
          import fs from 'node:fs';
          const status = JSON.parse(fs.readFileSync('.deploy/before.json', 'utf8'));
          if (!JSON.stringify(status).includes(process.env.CURRENT_VERSION_ID)) {
            throw new Error('Production no longer points at the captured rollback version.');
          }
          NODE

          npx wrangler versions view "$CURRENT_VERSION_ID" --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/current-version.json

          node <<'NODE'
          import fs from 'node:fs';
          const version = JSON.parse(fs.readFileSync('.deploy/current-version.json', 'utf8'));
          const bindings = version?.resources?.bindings;
          if (!Array.isArray(bindings)) throw new Error('Current version bindings were not returned.');
          const find = (type, name) => bindings.find((binding) => binding?.type === type && binding?.name === name);
          const kv = find('kv_namespace', 'OAUTH_KV');
          if (!kv?.namespace_id) throw new Error('OAUTH_KV namespace ID is unavailable.');
          const required = [
            ['ai', 'AI'],
            ['images', 'IMAGES'],
            ['durable_object_namespace', 'MCP_OBJECT'],
            ['durable_object_namespace', 'AUTH_STATE'],
            ['secret_text', 'MICROSOFT_CLIENT_ID'],
            ['secret_text', 'MICROSOFT_CLIENT_SECRET'],
            ['secret_text', 'COOKIE_ENCRYPTION_KEY'],
            ['plain_text', 'ONEDRIVE_ROOT'],
            ['plain_text', 'OWNER_MICROSOFT_ID'],
          ];
          for (const [type, name] of required) {
            if (!find(type, name)) throw new Error(`Required live binding missing: ${type}:${name}`);
          }
          const config = {
            $schema: '../node_modules/wrangler/config-schema.json',
            name: process.env.WORKER_NAME,
            main: '../src/index.ts',
            compatibility_date: '2026-07-13',
            compatibility_flags: ['nodejs_compat'],
            keep_vars: true,
            migrations: [
              { new_sqlite_classes: ['OneDriveMCP'], tag: 'v1' },
              { new_sqlite_classes: ['AuthState'], tag: 'v2' },
            ],
            durable_objects: {
              bindings: [
                { class_name: 'OneDriveMCP', name: 'MCP_OBJECT' },
                { class_name: 'AuthState', name: 'AUTH_STATE' },
              ],
            },
            kv_namespaces: [{ binding: 'OAUTH_KV', id: kv.namespace_id }],
            ai: { binding: 'AI' },
            images: { binding: 'IMAGES' },
            browser: { binding: 'BROWSER' },
            observability: { enabled: true },
          };
          fs.writeFileSync('.deploy/wrangler.stage.json', JSON.stringify(config, null, 2));
          NODE

          tag="integrated-${GITHUB_SHA:0:12}"
          npx wrangler versions upload \
            --config .deploy/wrangler.stage.json \
            --keep-vars \
            --strict \
            --tag "$tag" \
            --message "Stage integrated source integrity upgrade from $GITHUB_SHA"

          npx wrangler versions list --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/versions.json
          new_version_id="$(TAG="$tag" node <<'NODE'
          import fs from 'node:fs';
          const versions = JSON.parse(fs.readFileSync('.deploy/versions.json', 'utf8'));
          const found = versions.find((version) => version?.annotations?.['workers/tag'] === process.env.TAG);
          if (!found?.id) process.exit(2);
          process.stdout.write(found.id);
          NODE
          )"
          [[ "$new_version_id" =~ ^[0-9a-f-]{36}$ ]]

          npx wrangler versions deploy \
            "$CURRENT_VERSION_ID@100%" \
            "$new_version_id@0%" \
            --name "$WORKER_NAME" \
            --config .deploy/lookup.json \
            --message "Zero-traffic staged integrated upgrade $new_version_id" \
            -y

          override="${WORKER_NAME}=\"${new_version_id}\""
          for path in health ready ''; do
            url="$WORKER_URL/${path}"
            curl --fail --silent --show-error --max-time 30 \
              -H "Cloudflare-Workers-Version-Overrides: $override" \
              "$url" > ".deploy/${path:-root}.json"
          done

          node <<'NODE'
          import fs from 'node:fs';
          const health = JSON.parse(fs.readFileSync('.deploy/health.json', 'utf8'));
          const ready = JSON.parse(fs.readFileSync('.deploy/ready.json', 'utf8'));
          const root = JSON.parse(fs.readFileSync('.deploy/root.json', 'utf8'));
          if (health.ok !== true) throw new Error('Staged health failed.');
          if (ready.ready !== true || ready.bindings !== true || ready.authState !== true || ready.browserRun !== true || ready.integratedTools !== true) {
            throw new Error(`Staged readiness failed: ${JSON.stringify(ready)}`);
          }
          if (root.snapshots !== true || root.documentVisuals !== true || root.integrityPlans !== true || root.planGatedRecycle !== true || root.permanentDeletion !== false) {
            throw new Error(`Staged capability surface failed: ${JSON.stringify(root)}`);
          }
          NODE

          curl --fail --silent --show-error --max-time 30 "$WORKER_URL/health" > .deploy/production-health.json
          node -e "const x=require('./.deploy/production-health.json'); process.exit(x.ok===true?0:1)"

          NEW_VERSION_ID="$new_version_id" TAG="$tag" node <<'NODE'
          import fs from 'node:fs';
          fs.writeFileSync('.deploy/stage-result.json', JSON.stringify({
            sourceSha: process.env.GITHUB_SHA,
            previousVersionId: process.env.CURRENT_VERSION_ID,
            stagedVersionId: process.env.NEW_VERSION_ID,
            tag: process.env.TAG,
            stagedTraffic: 0,
            productionTraffic: 100,
            health: 'pass',
            readiness: 'pass',
            capabilitySurface: 'pass',
          }, null, 2));
          NODE

      - name: Upload sanitized staging record
        uses: actions/upload-artifact@v4
        with:
          name: integrated-staging-record-${{ github.sha }}
          path: .deploy/stage-result.json
          if-no-files-found: error
          retention-days: 1
