name: Stage Worker bundle

on:
  push:
    branches: [work/integrated-source-integrity-visuals]

permissions:
  contents: write

jobs:
  stage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/integrated-source-integrity-visuals
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci
      - name: Build deterministic deployment bundle
        run: npx wrangler deploy --dry-run --outdir deployment-stage
      - name: Keep only the executable bundle and remove this workflow
        run: |
          rm -f deployment-stage/index.js.map deployment-stage/README.md
          rm -f .github/workflows/stage-worker-bundle.yml
          test -s deployment-stage/index.js
          sha256sum deployment-stage/index.js > deployment-stage/index.js.sha256
      - name: Commit temporary deployment bundle
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: stage verified Worker bundle for version upload'
          git push origin HEAD:work/integrated-source-integrity-visuals
