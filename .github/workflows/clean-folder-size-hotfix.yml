name: Clean folder-size hotfix generated files

on:
  push:
    branches:
      - work/folder-size-comparison-hotfix
    paths:
      - .github/workflows/clean-folder-size-hotfix.yml
      - clean-folder-size-hotfix-trigger.txt

permissions:
  contents: write

jobs:
  clean-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Restore generated wrappers from main
        run: |
          git fetch origin main
          git checkout origin/main -- src/generated/pdfjs-main.ts src/generated/pdfjs-worker.ts
      - name: Install and validate without committing generated build outputs
        shell: bash
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run type-check
          npm test
          npm audit --audit-level=high
          cp wrangler.jsonc wrangler.cleanup-ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.cleanup-ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.cleanup-ci.jsonc
          npx wrangler versions upload --dry-run --config wrangler.cleanup-ci.jsonc --outdir dist-cleanup
          git checkout origin/main -- src/generated/pdfjs-main.ts src/generated/pdfjs-worker.ts
          rm -rf dist-cleanup wrangler.cleanup-ci.jsonc
      - name: Remove temporary controller and commit clean source-only tree
        shell: bash
        run: |
          rm -f .github/workflows/clean-folder-size-hotfix.yml clean-folder-size-hotfix-trigger.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Clean generated files from folder-size comparison hotfix"
          git push origin HEAD:work/folder-size-comparison-hotfix
