name: Upload integrity Free-plan candidate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/upload-integrity-free-plan-candidate.yml

permissions:
  contents: read

jobs:
  upload-candidate:
    if: github.event.pull_request.head.ref == 'work/integrity-plan-free-budget'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/integrity-plan-free-budget
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Build and verify exact candidate module
        run: |
          cp wrangler.jsonc wrangler.transfer.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.transfer.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.transfer.jsonc
          npx wrangler deploy --dry-run --config wrangler.transfer.jsonc --outdir transfer-dist
          echo "9a6c9d1cf655f41dde064795ed04b84639b11e92e066314c088e90e5708fb021  transfer-dist/index-hotfix.js" | sha256sum -c -
          gzip -n -9 -c transfer-dist/index-hotfix.js > transfer-dist/index-hotfix.js.gz
          echo "bc97f152636276c2b759da312331d279590cf294605117e31e811dd7715dbf79  transfer-dist/index-hotfix.js.gz" | sha256sum -c -
      - name: Transfer candidate to one-time Cloudflare buffer
        shell: bash
        run: |
          set -o pipefail
          curl --fail-with-body --silent --show-error \
            -H "x-transfer-token: HWT7Db1GTqrFuwNu609gIjTu6UrVFg6wM0iHXMYbtZU" \
            -H "content-type: application/gzip" \
            --data-binary @transfer-dist/index-hotfix.js.gz \
            https://integrity-plan-transfer-4fefecd4.fdas201290.workers.dev/upload 2>&1 | tee transfer-upload.log
      - name: Upload transfer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-candidate-transfer
          path: transfer-upload.log
          if-no-files-found: ignore
          retention-days: 1
