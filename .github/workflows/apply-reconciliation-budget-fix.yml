name: Apply reconciliation budget correction

on:
  push:
    branches: [work/integrity-resume-reconciliation]
    paths:
      - .github/workflows/apply-reconciliation-budget-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/integrity-resume-reconciliation
      - name: Bound reconciliation below Workers Free subrequest ceiling
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/integrity-resume-repair.ts')
          text = p.read_text()
          old = 'const DEFAULT_RECONCILIATIONS = 8;\nconst MAX_RECONCILIATIONS = 20;'
          new = 'const DEFAULT_RECONCILIATIONS = 2;\nconst MAX_RECONCILIATIONS = 3;'
          if old not in text:
              raise SystemExit('reconciliation constants anchor missing')
          p.write_text(text.replace(old, new))

          t = Path('test/integrity-resume-repair.test.ts')
          tests = t.read_text()
          marker = 'test("audit snapshot work is bounded below the Workers Free external-subrequest limit", () => {'
          addition = '''test("reconciliation batch is hard-bounded for Workers Free", () => {\n  assert.match(source, /const DEFAULT_RECONCILIATIONS = 2/);\n  assert.match(source, /const MAX_RECONCILIATIONS = 3/);\n});\n\n'''
          if addition not in tests:
              if marker not in tests:
                  raise SystemExit('test insertion anchor missing')
              tests = tests.replace(marker, addition + marker)
          t.write_text(tests)
          PY
      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-reconciliation-budget-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/integrity-resume-repair.ts test/integrity-resume-repair.test.ts .github/workflows/apply-reconciliation-budget-fix.yml
          git commit -m "Bound plan reconciliation for Workers Free"
          git push origin HEAD:work/integrity-resume-reconciliation
