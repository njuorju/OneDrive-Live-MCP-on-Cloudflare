name: Capture production dependency audit

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/capture-production-audit.yml

permissions:
  contents: write

jobs:
  audit:
    if: github.event.pull_request.head.ref == 'work/scheduled-execution-schema' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/scheduled-execution-schema
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Capture audit JSON
        shell: bash
        run: npm audit --json --omit=dev > audit-production.json || true
      - name: Publish bounded diagnostic
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit-production.json
          git commit -m "Capture production dependency audit"
          git push origin HEAD:work/scheduled-execution-schema
