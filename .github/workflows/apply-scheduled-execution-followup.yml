name: Apply scheduled execution contract follow-up

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/apply-scheduled-execution-followup.yml
      - scripts/apply-scheduled-execution-followup.py

permissions:
  contents: write

jobs:
  followup:
    if: github.event.pull_request.head.ref == 'work/scheduled-execution-schema' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/scheduled-execution-schema
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Apply final contract follow-up
        run: python scripts/apply-scheduled-execution-followup.py
      - name: Typecheck
        run: npm run type-check
      - name: Complete automated test suite
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Wrangler dry-run
        run: npx wrangler deploy --dry-run --outdir /tmp/dist-scheduled-followup
      - name: Commit validated follow-up
        shell: bash
        run: |
          git checkout origin/main -- src/generated/pdfjs-main.ts src/generated/pdfjs-worker.ts
          rm -f .github/workflows/apply-scheduled-execution-followup.yml
          rm -f scripts/apply-scheduled-execution-followup.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete scheduled execution contention metadata"
          git push origin HEAD:work/scheduled-execution-schema
