name: Materialize integrated upgrade

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'work/integrated-source-integrity-visuals'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Verify and extract payload
        shell: bash
        run: |
          set -euo pipefail
          cat .integration-stage/part-* > /tmp/integrated-payload.b64
          printf '%s  %s\n' '0a4024301ffd00c140ab9fe18f25ffc6421f230756dcd5c46896627cd7d3125d' /tmp/integrated-payload.b64 | sha256sum -c -
          base64 -d /tmp/integrated-payload.b64 > /tmp/integrated-payload.tar.gz
          printf '%s  %s\n' '4481be148f7ac0a89889d415ffd167ac5c2a91d7e5e04d2db2a5e25e943a5e53' /tmp/integrated-payload.tar.gz | sha256sum -c -
          tar -xzf /tmp/integrated-payload.tar.gz
          rm -rf .integration-stage .github/workflows/materialize-integrated-upgrade.yml
      - name: Commit materialized source and remove staging
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement integrated source integrity and visuals'
          git push origin HEAD:${{ github.head_ref }}
