name: Upload integrity resume candidate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - .github/workflows/upload-integrity-resume-candidate.yml
      - src/auth-state.ts
      - src/index-hotfix.ts
      - src/integrity-coordination.ts
      - src/integrity-lease-tools.ts
      - src/integrity-resume-repair.ts
      - src/integrity-blocked-move-reconcile.ts
      - src/integrity-downstream-reconcile.ts
      - src/integrity-execution.ts
      - src/snapshot-runner.ts
      - test/integrity-coordination.test.ts
      - test/integrity-scheduled-execution.test.ts
      - test/integrity-resume-repair.test.ts
      - test/integrity-blocked-move-reconcile.test.ts
      - test/integrity-downstream-reconcile.test.ts
      - worker-configuration.d.ts
      - wrangler.jsonc
  push:
    branches: [main]
    paths:
      - .github/workflows/upload-integrity-resume-candidate.yml
      - src/auth-state.ts
      - src/index-hotfix.ts
      - src/integrity-coordination.ts
      - src/integrity-lease-tools.ts
      - src/integrity-resume-repair.ts
      - src/integrity-blocked-move-reconcile.ts
      - src/integrity-downstream-reconcile.ts
      - src/integrity-execution.ts
      - src/snapshot-runner.ts
      - test/integrity-coordination.test.ts
      - test/integrity-scheduled-execution.test.ts
      - test/integrity-resume-repair.test.ts
      - test/integrity-blocked-move-reconcile.test.ts
      - test/integrity-downstream-reconcile.test.ts
      - worker-configuration.d.ts
      - wrangler.jsonc

permissions:
  contents: read

jobs:
  upload-candidate:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'work/integrity-resume-reconciliation' || github.event.pull_request.head.ref == 'work/scheduled-execution-schema'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Validate exact candidate
        run: |
          npm run type-check
          npm test
          npm audit --audit-level=high --omit=dev
      - name: Record full dependency advisory report
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Generate exact live upload configuration
        run: |
          cat > wrangler.live.jsonc <<'JSON'
          {
            "$schema": "node_modules/wrangler/config-schema.json",
            "name": "nikolay-onedrive-mcp",
            "main": "src/index-hotfix.ts",
            "compatibility_date": "2026-07-13",
            "compatibility_flags": ["nodejs_compat"],
            "keep_vars": true,
            "build": { "command": "node scripts/prepare-pdfjs.mjs" },
            "vars": {
              "CONNECTOR_NAME": "OneDrive Live MCP",
              "ONEDRIVE_ROOT": "Работа",
              "OWNER_MICROSOFT_ID": "ecb0593363f23423",
              "MAX_FILE_MB": "20",
              "MAX_ORIGINAL_FILE_MB": "25",
              "MAX_TEXT_WRITE_KB": "512",
              "MAX_READ_CHARS": "50000",
              "CACHE_TTL_SECONDS": "604800",
              "MAX_IMAGE_INPUT_MB": "15",
              "MAX_IMAGE_PIXELS": "40000000",
              "MAX_IMAGE_DIMENSION": "8192",
              "MAX_IMAGE_PAGES": "8",
              "IMAGE_PROCESSING_TIMEOUT_MS": "15000",
              "INTEGRITY_LEASE_SECONDS": "${{ github.event_name == 'pull_request' && '60' || '600' }}",
              "WORKER_DEPLOYMENT_ID": "repo-${{ github.sha }}"
            },
            "secrets": {
              "required": ["COOKIE_ENCRYPTION_KEY", "MICROSOFT_CLIENT_ID", "MICROSOFT_CLIENT_SECRET"]
            },
            "migrations": [
              { "new_sqlite_classes": ["OneDriveMCP"], "tag": "v1" },
              { "new_sqlite_classes": ["AuthState"], "tag": "v2" }
            ],
            "durable_objects": {
              "bindings": [
                { "class_name": "OneDriveMCP", "name": "MCP_OBJECT" },
                { "class_name": "AuthState", "name": "AUTH_STATE" }
              ]
            },
            "kv_namespaces": [
              { "binding": "OAUTH_KV", "id": "a3ead543dad24b8596ab9193b10f1b9f" }
            ],
            "ai": { "binding": "AI" },
            "images": { "binding": "IMAGES" },
            "browser": { "binding": "BROWSER" },
            "observability": { "enabled": true }
          }
          JSON
      - name: Build exact candidate bundle
        run: npx wrangler deploy --dry-run --config wrangler.live.jsonc --outdir dist-live
      - name: Transfer candidate to temporary Cloudflare-owned buffer
        shell: bash
        run: |
          set -o pipefail
          sha256sum dist-live/index-hotfix.js | tee version-upload.log
          curl --fail-with-body --silent --show-error \
            -H "x-transfer-token: NdJ7comIkGfIPshF12FvMMetP5OEkEbER3kbe5wOc4U" \
            -H "content-type: application/javascript" \
            --data-binary @dist-live/index-hotfix.js \
            https://integrity-resume-transfer-b65d8214.fdas201290.workers.dev/upload-js | tee -a version-upload.log
      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-resume-candidate-upload
          path: version-upload.log
          if-no-files-found: ignore
          retention-days: 1
