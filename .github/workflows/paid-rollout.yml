name: Paid Workers bundle staging

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: paid-workers-bundle-staging
  cancel-in-progress: false

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_SHA: 4cf02eb8abdb3d494f254da4d701204193a4d669
      CI_RUN_ID: "30010817910"
      BUNDLE_ARTIFACT: worker-bundle-4a81a3d2d3df9a286b7f4cc5750464ede5e46aea
      EXPECTED_BUNDLE_SHA256: 4f3f768c108cc12633c9d218c04010da8b1c55e571d89895130c613b37cd85ba
      UPLOAD_URL: https://onedrive-paid-rollout-uploader.fdas201290.workers.dev/upload-4cf02eb8

    steps:
      - name: Check out immutable source head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Download CI-validated Worker bundle
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.CI_RUN_ID }}
          name: ${{ env.BUNDLE_ARTIFACT }}
          path: worker-bundle

      - name: Verify exact bundle identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          echo "$EXPECTED_BUNDLE_SHA256  worker-bundle/index-hotfix.js" | sha256sum --check --strict
          grep -q 'PaidCoordinator' worker-bundle/index-hotfix.js
          grep -q 'PaidConnectorWorkflow' worker-bundle/index-hotfix.js

      - name: Upload exact bundle to private R2 staging
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --retry 2 --request PUT \
            --header 'Content-Type: application/javascript' \
            --data-binary @worker-bundle/index-hotfix.js \
            "$UPLOAD_URL" | tee upload-result.json

      - name: Preserve upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: paid-bundle-staging-${{ github.run_id }}
          path: upload-result.json
          retention-days: 1
