name: Stage integrated OneDrive upgrade once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/stage-integrated-upgrade-once.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: stage-integrated-onedrive-upgrade-once
  cancel-in-progress: false

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: nikolay-onedrive-mcp
      EXPECTED_SOURCE_SHA: 85b554cbf68aef3f4b5934860c63f328b7db5a0f
      CURRENT_VERSION_ID: ea3ee285-1958-46c5-9ac6-b2c8a3202ece
      WORKER_URL: https://nikolay-onedrive-mcp.fdas201290.workers.dev
      PR_NUMBER: "4"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_SOURCE_SHA }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Validate and stage at zero traffic
        id: stage
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          : > /tmp/stage.log
          exec > >(tee -a /tmp/stage.log) 2>&1
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_SHA"
          test -n "${CLOUDFLARE_API_TOKEN:-}"

          npm ci --ignore-scripts --no-audit --no-fund
          npm run type-check
          npm test
          npm audit --audit-level=high
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist-check

          mkdir -p .deploy
          printf '{"name":"%s"}\n' "$WORKER_NAME" > .deploy/lookup.json
          npx wrangler deployments status --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/before.json
          CURRENT_VERSION_ID="$CURRENT_VERSION_ID" node <<'NODE'
          import fs from 'node:fs';
          const status = JSON.parse(fs.readFileSync('.deploy/before.json', 'utf8'));
          if (!JSON.stringify(status).includes(process.env.CURRENT_VERSION_ID)) throw new Error('Captured production version is no longer active.');
          NODE

          npx wrangler versions view "$CURRENT_VERSION_ID" --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/current-version.json
          node <<'NODE'
          import fs from 'node:fs';
          const version = JSON.parse(fs.readFileSync('.deploy/current-version.json', 'utf8'));
          const bindings = version?.resources?.bindings;
          if (!Array.isArray(bindings)) throw new Error('Live bindings unavailable.');
          const find = (type, name) => bindings.find((binding) => binding?.type === type && binding?.name === name);
          const kv = find('kv_namespace', 'OAUTH_KV');
          if (!kv?.namespace_id) throw new Error('OAUTH_KV binding unavailable.');
          for (const [type, name] of [
            ['ai','AI'], ['images','IMAGES'], ['durable_object_namespace','MCP_OBJECT'],
            ['durable_object_namespace','AUTH_STATE'], ['secret_text','MICROSOFT_CLIENT_ID'],
            ['secret_text','MICROSOFT_CLIENT_SECRET'], ['secret_text','COOKIE_ENCRYPTION_KEY'],
            ['plain_text','ONEDRIVE_ROOT'], ['plain_text','OWNER_MICROSOFT_ID']
          ]) if (!find(type, name)) throw new Error(`Required binding missing: ${type}:${name}`);
          fs.writeFileSync('.deploy/wrangler.stage.json', JSON.stringify({
            $schema: '../node_modules/wrangler/config-schema.json',
            name: process.env.WORKER_NAME,
            main: '../src/index.ts',
            compatibility_date: '2026-07-13',
            compatibility_flags: ['nodejs_compat'],
            keep_vars: true,
            migrations: [
              { new_sqlite_classes: ['OneDriveMCP'], tag: 'v1' },
              { new_sqlite_classes: ['AuthState'], tag: 'v2' }
            ],
            durable_objects: { bindings: [
              { class_name: 'OneDriveMCP', name: 'MCP_OBJECT' },
              { class_name: 'AuthState', name: 'AUTH_STATE' }
            ]},
            kv_namespaces: [{ binding: 'OAUTH_KV', id: kv.namespace_id }],
            ai: { binding: 'AI' },
            images: { binding: 'IMAGES' },
            browser: { binding: 'BROWSER' },
            observability: { enabled: true }
          }, null, 2));
          NODE

          tag="integrated-${EXPECTED_SOURCE_SHA:0:12}"
          npx wrangler versions upload --config .deploy/wrangler.stage.json --keep-vars --strict --tag "$tag" --message "Stage integrated upgrade from $EXPECTED_SOURCE_SHA"
          npx wrangler versions list --name "$WORKER_NAME" --config .deploy/lookup.json --json > .deploy/versions.json
          new_version_id="$(TAG="$tag" node <<'NODE'
          import fs from 'node:fs';
          const versions = JSON.parse(fs.readFileSync('.deploy/versions.json', 'utf8'));
          const found = versions.find((version) => version?.annotations?.['workers/tag'] === process.env.TAG);
          if (!found?.id) process.exit(2);
          process.stdout.write(found.id);
          NODE
          )"
          [[ "$new_version_id" =~ ^[0-9a-f-]{36}$ ]]

          npx wrangler versions deploy "$CURRENT_VERSION_ID@100%" "$new_version_id@0%" --name "$WORKER_NAME" --config .deploy/lookup.json --message "Zero-traffic staged integrated upgrade $new_version_id" -y
          override="${WORKER_NAME}=\"${new_version_id}\""
          curl --fail --silent --show-error --max-time 30 -H "Cloudflare-Workers-Version-Overrides: $override" "$WORKER_URL/health" > .deploy/health.json
          curl --fail --silent --show-error --max-time 30 -H "Cloudflare-Workers-Version-Overrides: $override" "$WORKER_URL/ready" > .deploy/ready.json
          curl --fail --silent --show-error --max-time 30 -H "Cloudflare-Workers-Version-Overrides: $override" "$WORKER_URL/" > .deploy/root.json
          curl --fail --silent --show-error --max-time 30 "$WORKER_URL/health" > .deploy/production-health.json

          NEW_VERSION_ID="$new_version_id" node <<'NODE'
          import fs from 'node:fs';
          const health = JSON.parse(fs.readFileSync('.deploy/health.json','utf8'));
          const ready = JSON.parse(fs.readFileSync('.deploy/ready.json','utf8'));
          const root = JSON.parse(fs.readFileSync('.deploy/root.json','utf8'));
          const production = JSON.parse(fs.readFileSync('.deploy/production-health.json','utf8'));
          if (health.ok !== true || production.ok !== true) throw new Error('Health smoke failed.');
          if (ready.ready !== true || ready.bindings !== true || ready.authState !== true || ready.browserRun !== true || ready.integratedTools !== true) throw new Error(`Readiness smoke failed: ${JSON.stringify(ready)}`);
          if (root.snapshots !== true || root.documentVisuals !== true || root.integrityPlans !== true || root.planGatedRecycle !== true || root.permanentDeletion !== false) throw new Error(`Capability smoke failed: ${JSON.stringify(root)}`);
          fs.writeFileSync('/tmp/stage-result.json', JSON.stringify({
            sourceSha: process.env.EXPECTED_SOURCE_SHA,
            previousVersionId: process.env.CURRENT_VERSION_ID,
            stagedVersionId: process.env.NEW_VERSION_ID,
            productionTraffic: 100,
            stagedTraffic: 0,
            health: 'PASS', readiness: 'PASS', capabilitySurface: 'PASS'
          }, null, 2));
          NODE

      - name: Report result to PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE_OUTCOME: ${{ steps.stage.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f /tmp/stage-result.json ]]; then
            node <<'NODE' > /tmp/comment.md
          const fs = require('fs');
          const x = JSON.parse(fs.readFileSync('/tmp/stage-result.json','utf8'));
          console.log(`## Zero-traffic staging passed\n\n- Source: \`${x.sourceSha}\`\n- Previous production: \`${x.previousVersionId}\` at 100%\n- Staged version: \`${x.stagedVersionId}\` at 0%\n- Override health: **${x.health}**\n- Override readiness/live configured-root check: **${x.readiness}**\n- Capability surface: **${x.capabilitySurface}**\n- Ordinary production health: **PASS**`);
          NODE
          else
            {
              echo "## Zero-traffic staging failed"
              echo
              echo "- Source: \`$EXPECTED_SOURCE_SHA\`"
              echo "- Outcome: \`$STAGE_OUTCOME\`"
              echo "- Production remains on \`$CURRENT_VERSION_ID\`; inspect the one-shot workflow log for the bounded failure."
            } > /tmp/comment.md
          fi
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --input <(node -e "const fs=require('fs'); console.log(JSON.stringify({body:fs.readFileSync('/tmp/comment.md','utf8')}))")

      - name: Remove one-shot workflow from main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git switch -C main origin/main
          rm -f .github/workflows/stage-integrated-upgrade-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/stage-integrated-upgrade-once.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove one-shot integrated staging workflow"
            git push origin main
          fi

      - name: Fail when staging failed
        if: steps.stage.outcome != 'success'
        run: exit 1
