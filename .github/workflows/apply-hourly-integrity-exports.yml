name: Apply hourly integrity scheduler exports

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - src/index-hotfix.ts
      - src/scheduled-integrity.ts
      - src/integrity-lease-tools.ts
      - scripts/apply-hourly-integrity-exports.mjs
      - .github/workflows/apply-hourly-integrity-exports.yml

permissions:
  contents: write

concurrency:
  group: hourly-integrity-scheduler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.event.pull_request.head.ref == 'work/hourly-integrity-scheduler'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/hourly-integrity-scheduler
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
      - name: Apply deterministic exports
        run: node scripts/apply-hourly-integrity-exports.mjs
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate scheduler
        run: |
          npm run type-check
          npm test
          npm audit --audit-level=high
          cp wrangler.jsonc wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_ALLOWED_ONEDRIVE_FOLDER/CI_TEST_ROOT/g' wrangler.ci.jsonc
          sed -i 's/REPLACE_WITH_KV_NAMESPACE_ID/00000000000000000000000000000000/g' wrangler.ci.jsonc
          npx wrangler deploy --dry-run --config wrangler.ci.jsonc --outdir dist-check
      - name: Upload validated Worker bundle
        uses: actions/upload-artifact@v4
        with:
          name: hourly-integrity-worker-${{ github.sha }}
          path: dist-check
          if-no-files-found: error
          retention-days: 2
      - name: Commit generated export wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/integrity-lease-tools.ts
          git commit -m "Export bounded scheduler execution helpers" || exit 0
          git fetch origin work/hourly-integrity-scheduler
          git rebase origin/work/hourly-integrity-scheduler
          git push origin HEAD:work/hourly-integrity-scheduler
